openapi: 3.0.3
info:
  title: WIG API
  description: WIG(가중목) 서비스 API 명세서
  version: 0.1.0
servers:
  - url: /api
    description: Local development server

paths:
  /auth/login:
    post:
      summary: 로그인
      description: ID/PW를 사용하여 로그인하고 세션을 생성합니다.
      tags:
        - Auth
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customId
                - password
              properties:
                customId:
                  type: string
                  example: john123
                password:
                  type: string
                  format: password
                  example: user
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema:
                type: string
                example: wig_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400
          content:
            application/json:
              schema:
                type: object
                properties:
                  user:
                    $ref: '#/components/schemas/User'
        '401':
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: 입력값 누락
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /auth/logout:
    post:
      summary: 로그아웃
      description: 현재 세션을 종료합니다.
      tags:
        - Auth
      responses:
        '204':
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              schema:
                type: string
                example: wig_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/password:
    put:
      summary: 비밀번호 변경
      description: 현재 비밀번호를 확인한 후 새로운 비밀번호로 변경합니다.
      tags:
        - Auth
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - currentPassword
                - newPassword
              properties:
                currentPassword:
                  type: string
                  format: password
                newPassword:
                  type: string
                  format: password
      responses:
        '200':
          description: 비밀번호 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: 비밀번호가 변경되었습니다.
        '400':
          description: 현재 비밀번호 불일치
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: 비밀번호 유효성 규칙 미충족
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/users:
    post:
      summary: [ADMIN] 새 멤버 추가
      description: 관리자가 새로운 사용자 계정을 생성합니다.
      tags:
        - Admin
      security:
        - sessionCookie: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - customId
                - nickname
              properties:
                customId:
                  type: string
                nickname:
                  type: string
      responses:
        '201':
          description: 사용자 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
                  customId:
                    type: string
                  nickname:
                    type: string
                  initialPassword:
                    type: string
                    example: user
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: 이미 사용 중인 ID
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
        nickname:
          type: string
        isFirstLogin:
          type: boolean

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: string
              description: 머신 리더블 에러 코드
            message:
              type: string
              description: 사람이 읽을 수 있는 한국어 메시지
            details:
              type: object
              description: 유효성 검사 실패 시 필드별 상세 오류 (선택)

  responses:
    UnauthorizedError:
      description: 로그인이 필요합니다.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: wig_sid
