openapi: 3.0.3
info:
  title: WIG API
  description: WIG(가중목) 서비스 API 명세서
  version: 0.1.0
servers:
  - url: /api
    description: Local development server

paths:
  /auth/login:
    post:
      summary: 로그인
      tags: [Auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, password]
              properties:
                customId: { type: string, example: john123 }
                password: { type: string, format: password, example: user }
      responses:
        '200':
          description: 로그인 성공
          headers:
            Set-Cookie:
              schema: { type: string, example: "wig_sid=abc; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=86400" }
          content:
            application/json:
              schema:
                type: object
                properties:
                  user: { $ref: '#/components/schemas/User' }
        '401':
          description: 아이디 또는 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }

  /auth/logout:
    post:
      summary: 로그아웃
      tags: [Auth]
      responses:
        '204':
          description: 로그아웃 성공
          headers:
            Set-Cookie:
              schema: { type: string, example: "wig_sid=; HttpOnly; Secure; SameSite=Lax; Path=/; Max-Age=0" }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /auth/password:
    put:
      summary: 비밀번호 변경
      tags: [Auth]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword: { type: string, format: password }
                newPassword: { type: string, format: password }
      responses:
        '200':
          description: 비밀번호 변경 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: "비밀번호가 변경되었습니다." }
        '400':
          description: 현재 비밀번호 불일치
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 비밀번호 유효성 규칙 미충족
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /users/me:
    get:
      summary: 내 프로필 조회
      tags: [Profile]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    put:
      summary: 내 닉네임 변경
      tags: [Profile]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UserProfileUpdateRequest' }
      responses:
        '200':
          description: 변경 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/UserProfile' }
        '422':
          description: 닉네임 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 사용자를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /admin/users:
    post:
      summary: "[ADMIN] 새 멤버 추가"
      tags: [Admin]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [customId, nickname, password]
              properties:
                customId: { type: string }
                nickname: { type: string }
                password: { type: string }
      responses:
        '201':
          description: 사용자 생성 성공
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  customId: { type: string }
                  nickname: { type: string }
        '403':
          description: 관리자 권한 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: 이미 사용 중인 ID
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/me:
    get:
      summary: 내 워크스페이스 정보 조회
      tags: [Workspace]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '404':
          description: 소속된 워크스페이스 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces:
    post:
      summary: "[ADMIN] 새 워크스페이스 생성"
      tags: [Workspace]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string, example: "나의 워크스페이스" }
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '403':
          description: 권한 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/join:
    post:
      summary: 워크스페이스 참가
      tags: [Workspace]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [workspaceId]
              properties:
                workspaceId: { type: integer, example: 1 }
      responses:
        '200':
          description: 참가 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Workspace' }
        '400':
          description: 잘못된 요청 또는 이미 가입됨
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /workspaces/{id}/members:
    get:
      summary: 워크스페이스 멤버 목록 조회
      tags: [Workspace]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/WorkspaceMember' }
        '403':
          description: 해당 워크스페이스 접근 권한 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/active:
    get:
      summary: 현재 활성 점수판 조회
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Scoreboard' }
        '404':
          description: 활성 점수판 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards:
    get:
      summary: 보관된 점수판 목록 조회
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/ScoreboardSummary' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: 점수판 생성
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScoreboardCreateRequest' }
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScoreboardSummary' }
        '409':
          description: 이미 활성 점수판 존재
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{id}:
    put:
      summary: 점수판 수정
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/ScoreboardUpdateRequest' }
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScoreboardSummary' }
        '403':
          description: 보관된 점수판 수정 시도
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{id}/archive:
    post:
      summary: 점수판 보관
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 보관 성공
          content:
            application/json:
              schema:
                type: object
                required: [id, status]
                properties:
                  id: { type: integer }
                  status: { type: string, enum: [ARCHIVED] }
        '403':
          description: 이미 보관된 점수판
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{id}/reactivate:
    post:
      summary: 보관된 점수판 재활성화
      tags: [Scoreboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 재활성화 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ScoreboardSummary' }
        '400':
          description: 이미 활성 상태
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 점수판 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '409':
          description: 이미 다른 활성 점수판 존재
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{scoreboardId}/lead-measures:
    get:
      summary: 점수판 선행지표 목록 조회
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: scoreboardId
          in: path
          required: true
          schema: { type: integer }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [active, all], default: active }
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LeadMeasureListItem' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    post:
      summary: 선행지표 생성
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: scoreboardId
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LeadMeasureCreateRequest' }
      responses:
        '201':
          description: 생성 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadMeasure' }
        '403':
          description: ARCHIVED 점수판에 추가 시도
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /lead-measures/{id}:
    put:
      summary: 선행지표 수정
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/LeadMeasureUpdateRequest' }
      responses:
        '200':
          description: 수정 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadMeasure' }
        '403':
          description: ARCHIVED 선행지표 수정 시도
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      summary: 선행지표 삭제
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 삭제 성공
          content:
            application/json:
              schema:
                type: object
                required: [warning, deleted]
                properties:
                  warning: { type: string }
                  deleted: { type: boolean }
        '403':
          description: ARCHIVED 선행지표 삭제 시도
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /lead-measures/{id}/archive:
    post:
      summary: 선행지표 보관
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 보관 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadMeasure' }
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /lead-measures/{id}/reactivate:
    post:
      summary: 선행지표 재활성화
      tags: [LeadMeasure]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: integer }
      responses:
        '200':
          description: 재활성화 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LeadMeasure' }
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /lead-measures/{leadMeasureId}/logs/{date}:
    put:
      summary: 일일 기록 생성 또는 수정
      tags: [DailyLog]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: leadMeasureId
          in: path
          required: true
          schema: { type: integer }
        - name: date
          in: path
          required: true
          schema: { type: string, format: date }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/DailyLogUpsertRequest' }
      responses:
        '200':
          description: 저장 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/DailyLog' }
        '403':
          description: ARCHIVED 선행지표 기록 시도
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '422':
          description: 입력값 유효성 오류
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'
    delete:
      summary: 일일 기록 삭제
      tags: [DailyLog]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: leadMeasureId
          in: path
          required: true
          schema: { type: integer }
        - name: date
          in: path
          required: true
          schema: { type: string, format: date }
      responses:
        '204':
          description: 삭제 성공
        '404':
          description: 선행지표를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{scoreboardId}/logs/weekly:
    get:
      summary: 주간 기록 조회
      tags: [DailyLog]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: scoreboardId
          in: path
          required: true
          schema: { type: integer }
        - name: weekStart
          in: query
          required: false
          schema: { type: string, format: date }
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/WeeklyLogsResponse' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /scoreboards/{scoreboardId}/logs/monthly:
    get:
      summary: 월간 기록 조회
      tags: [DailyLog]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: scoreboardId
          in: path
          required: true
          schema: { type: integer }
        - name: monthStart
          in: query
          required: false
          schema: { type: string, format: date }
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/MonthlyLogsResponse' }
        '404':
          description: 점수판을 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

  /dashboard/team:
    get:
      summary: 팀 대시보드 조회
      tags: [Dashboard]
      security: [{ sessionCookie: [] }]
      parameters:
        - name: weekStart
          in: query
          required: false
          schema: { type: string, format: date }
        - name: cursor
          in: query
          required: false
          schema: { type: string }
      responses:
        '200':
          description: 조회 성공
          content:
            application/json:
              schema: { $ref: '#/components/schemas/TeamDashboardResponse' }
        '404':
          description: 워크스페이스를 찾을 수 없음
          content:
            application/json:
              schema: { $ref: '#/components/schemas/ErrorResponse' }
        '401':
          $ref: '#/components/responses/UnauthorizedError'

components:
  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        nickname: { type: string }
        isFirstLogin: { type: boolean }

    UserProfile:
      type: object
      properties:
        id: { type: integer }
        customId: { type: string }
        nickname: { type: string }
        role:
          type: string
          enum: [ADMIN, MEMBER]
          nullable: true
        workspaceId:
          type: integer
          nullable: true
        workspaceName:
          type: string
          nullable: true
        createdAt: { type: string, format: date-time }

    UserProfileUpdateRequest:
      type: object
      required: [nickname]
      properties:
        nickname:
          type: string
          minLength: 2
          maxLength: 20

    Workspace:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        createdAt: { type: string, format: date-time }

    WorkspaceMember:
      type: object
      properties:
        id: { type: integer }
        workspaceId: { type: integer }
        userId: { type: integer }
        nickname: { type: string }
        role: { type: string, enum: [ADMIN, MEMBER] }
        createdAt: { type: string, format: date-time }

    LeadMeasure:
      type: object
      properties:
        id: { type: integer }
        scoreboardId: { type: integer }
        name: { type: string }
        targetValue: { type: integer }
        period: { type: string, enum: [DAILY, WEEKLY, MONTHLY] }
        status: { type: string, enum: [ACTIVE, ARCHIVED] }
        createdAt: { type: string, format: date-time }
        archivedAt: { type: string, format: date-time, nullable: true }

    WeeklyAchievement:
      type: object
      properties:
        achieved: { type: integer }
        total: { type: integer }

    LeadMeasureListItem:
      allOf:
        - $ref: '#/components/schemas/LeadMeasure'
        - type: object
          properties:
            weeklyAchievement:
              $ref: '#/components/schemas/WeeklyAchievement'

    LeadMeasureCreateRequest:
      type: object
      required: [name, targetValue, period]
      properties:
        name: { type: string }
        targetValue: { type: integer, minimum: 1 }
        period: { type: string, enum: [DAILY, WEEKLY, MONTHLY] }

    LeadMeasureUpdateRequest:
      type: object
      minProperties: 1
      properties:
        name: { type: string }
        targetValue: { type: integer, minimum: 1 }
        period: { type: string, enum: [DAILY, WEEKLY, MONTHLY] }

    DailyLog:
      type: object
      properties:
        id: { type: integer }
        leadMeasureId: { type: integer }
        logDate: { type: string, format: date }
        value: { type: boolean }
        createdAt: { type: string, format: date-time }

    DailyLogUpsertRequest:
      type: object
      required: [value]
      properties:
        value:
          type: boolean
          enum: [true]

    WeeklyLogItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        targetValue: { type: integer }
        logs:
          type: object
          additionalProperties:
            type: boolean
            nullable: true
        achieved: { type: integer }
        achievementRate: { type: number }

    WeeklyLogsResponse:
      type: object
      properties:
        weekStart: { type: string, format: date }
        weekEnd: { type: string, format: date }
        leadMeasures:
          type: array
          items: { $ref: '#/components/schemas/WeeklyLogItem' }

    MonthlyLogItem:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        period: { type: string, enum: [WEEKLY, MONTHLY] }
        targetValue: { type: integer }
        logs:
          type: object
          additionalProperties:
            type: boolean
            nullable: true
        achieved: { type: integer }
        achievementRate: { type: number }

    MonthlyLogsResponse:
      type: object
      properties:
        monthStart: { type: string, format: date }
        monthEnd: { type: string, format: date }
        monthLabel: { type: string, example: "2026.03" }
        summary:
          $ref: '#/components/schemas/PeriodSummary'
        leadMeasures:
          type: array
          items: { $ref: '#/components/schemas/MonthlyLogItem' }

    PeriodSummary:
      type: object
      properties:
        achieved: { type: integer }
        total: { type: integer }
        achievementRate: { type: number }
        isWinning: { type: boolean }

    TeamDashboardMemberMeasure:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        period: { type: string, enum: [DAILY, WEEKLY, MONTHLY] }
        targetValue: { type: integer }
        achieved: { type: integer }
        achievementRate: { type: number }
        logs:
          type: object
          additionalProperties:
            type: boolean
            nullable: true

    TeamDashboardMember:
      type: object
      properties:
        userId: { type: integer }
        nickname: { type: string }
        role: { type: string, enum: [ADMIN, MEMBER] }
        hasScoreboard: { type: boolean }
        scoreboardId: { type: integer, nullable: true }
        goalName: { type: string, nullable: true }
        lagMeasure: { type: string, nullable: true }
        achieved: { type: integer }
        total: { type: integer }
        achievementRate: { type: number }
        weeklyAchievementRate: { type: number }
        monthlyAchievementRate: { type: number }
        isWinning: { type: boolean }
        leadMeasures:
          type: array
          items: { $ref: '#/components/schemas/TeamDashboardMemberMeasure' }

    TeamDashboardResponse:
      type: object
      properties:
        workspaceId: { type: integer }
        workspaceName: { type: string }
        weekStart: { type: string, format: date }
        weekEnd: { type: string, format: date }
        members:
          type: array
          items: { $ref: '#/components/schemas/TeamDashboardMember' }

    ScoreboardSummary:
      type: object
      properties:
        id: { type: integer }
        userId: { type: integer }
        workspaceId: { type: integer }
        goalName: { type: string }
        lagMeasure: { type: string }
        status: { type: string, enum: [ACTIVE, ARCHIVED] }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }
        createdAt: { type: string, format: date-time }

    Scoreboard:
      allOf:
        - $ref: '#/components/schemas/ScoreboardSummary'
        - type: object
          properties:
            leadMeasures:
              type: array
              items: { $ref: '#/components/schemas/LeadMeasure' }

    ScoreboardCreateRequest:
      type: object
      required: [goalName, lagMeasure, startDate]
      properties:
        goalName: { type: string }
        lagMeasure: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }

    ScoreboardUpdateRequest:
      type: object
      minProperties: 1
      properties:
        goalName: { type: string }
        lagMeasure: { type: string }
        startDate: { type: string, format: date }
        endDate: { type: string, format: date, nullable: true }

    ErrorResponse:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code: { type: string, description: 머신 리더블 에러 코드 }
            message: { type: string, description: 사람이 읽을 수 있는 한국어 메시지 }
            details: { type: object, description: 유효성 검사 실패 시 필드별 상세 오류 (선택) }

  responses:
    UnauthorizedError:
      description: 로그인이 필요합니다.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: wig_sid
