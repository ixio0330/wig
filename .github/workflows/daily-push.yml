name: Daily Push Notification Cron

on:
  schedule:
    # 21:00 KST is 12:00 UTC
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  send-request:
    runs-on: ubuntu-latest
    steps:
      - name: Send request to /api/push/send-daily
        run: |
          curl -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://wig.ixio0330.workers.dev/api/push/send-daily"
